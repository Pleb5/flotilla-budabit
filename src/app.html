<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="{ACCENT}" />
    <meta name="description" content="{DESCRIPTION}" />
    <meta property="og:url" content="{URL}" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="{NAME}" />
    <meta property="og:title" content="{NAME}" />
    <meta property="og:description" content="{DESCRIPTION}" />
    <meta property="og:image" content="{URL}/maskable-icon-512x512.png" />
    <meta property="og:image:alt" content="{NAME}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="{URL}" />
    <meta name="twitter:title" content="{NAME}" />
    <meta name="twitter:description" content="{DESCRIPTION}" />
    <meta name="twitter:image" content="{URL}/maskable-icon-512x512.png" />
    <link rel="icon" href="/favicon.ico" media="(prefers-color-scheme: light)" sizes="48x48" />
    <link rel="icon" href="/favicon-dark.ico" media="(prefers-color-scheme: dark)" sizes="48x48" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link
      rel="icon"
      href="/pwa-64x64.png"
      media="(prefers-color-scheme: light)"
      sizes="any"
      type="image/png" />
    <link
      rel="icon"
      href="/pwa-64x64-dark.png"
      media="(prefers-color-scheme: dark)"
      sizes="any"
      type="image/png" />
    <link
      rel="icon"
      href="/pwa-192x192.png"
      media="(prefers-color-scheme: light)"
      sizes="any"
      type="image/png" />
    <link
      rel="icon"
      href="/pwa-192x192-dark.png"
      media="(prefers-color-scheme: dark)"
      sizes="any"
      type="image/png" />
    <link
      rel="icon"
      href="/pwa-512x512.png"
      media="(prefers-color-scheme: light)"
      sizes="any"
      type="image/png" />
    <link
      rel="icon"
      href="/pwa-512x512-dark.png"
      media="(prefers-color-scheme: dark)"
      sizes="any"
      type="image/png" />
    <link
      rel="icon"
      href="/pwa-64x64.png"
      media="(prefers-color-scheme: light)"
      sizes="64x64"
      type="image/png" />
    <link
      rel="icon"
      href="/pwa-64x64-dark.png"
      media="(prefers-color-scheme: dark)"
      sizes="64x64"
      type="image/png" />
    <link
      rel="icon"
      href="/pwa-192x192.png"
      media="(prefers-color-scheme: light)"
      sizes="192x192"
      type="image/png" />
    <link
      rel="icon"
      href="/pwa-192x192-dark.png"
      media="(prefers-color-scheme: dark)"
      sizes="192x192"
      type="image/png" />
    <link
      rel="icon"
      href="/pwa-512x512.png"
      media="(prefers-color-scheme: light)"
      sizes="512x512"
      type="image/png" />
    <link
      rel="icon"
      href="/pwa-512x512-dark.png"
      media="(prefers-color-scheme: dark)"
      sizes="512x512"
      type="image/png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180x180.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preload" as="font" type="font/ttf" href="/fonts/Lato-Regular.ttf" crossorigin />
    <link rel="preload" as="font" type="font/ttf" href="/fonts/Lato-Bold.ttf" crossorigin />
    <link rel="preload" as="font" type="font/ttf" href="/fonts/Lato-Italic.ttf" crossorigin />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
